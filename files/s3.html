      <td class="z3" width="550" height="390">蝴蝶传粉：蝴蝶是一类重要的授粉昆虫，<img src="../images/h04.gif" width="40" height="40" alt=""/>从某种意义上说，蝴蝶比某些蜜蜂传粉更为有效，因为蝴蝶通常只取食花蜜，<img src="../images/h07.gif" width="30" height="25" alt=""/>其身体各部位带有的花粉即可进行有效传粉，而蜜蜂花粉篮中的花粉对植物来说是无效的。但可惜人们习惯认为蜜蜂有专门的花粉篮。 蝴蝶与蛾的分别： 蝴蝶：白天活动的，停憩时合翅的，触角是棍棒状的  蛾类：夜间活动的，停憩时翅成屋顶型，触角是丝状 蝴蝶分类： 4个蝴蝶科是：粉蝶科，如白粉蝶或黄蝶，以群集迁飞著名；凤蝶科，如凤蝶和绢蝶；灰蝶科，包括蓝灰蝶、铜色蝶、燕灰蝶、灰蝶和蚬蝶；蛱蝶科，是毛刷足蝴蝶。</td>
