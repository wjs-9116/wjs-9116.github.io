      <td class="z3" width="550" height="390">春天，许多蝴蝶在繁花丛中翩翩飞舞，组成了美丽的&ldquo;颂春图&rdquo;。我国云南有个蝴蝶泉，每当暮春季节，在泉旁的树丛间，<img src="../images/h02.gif" width="34" height="25" alt=""/>成群的蝴蝶在飞舞，相互衔着尾巴，在树枝上垂下一条长长的蝶&ldquo;链&rdquo;，几乎和水面相接。当五彩缤纷的蝴蝶翩翩飞舞时，仿佛千万朵会飞的花在沸腾，美丽极了。  蝴蝶不仅成群飞舞，而且常常漫山遍野，跨洲越海飞迁。蝴蝶飞迁的距离最远的达四千多公里，真是一次漫长的旅行。有趣的是，蝴蝶的飞迁是有一定方向的，而且很少有偏差，仿佛是一条无形的空中&ldquo;航线&rdquo;。速度最快的要算弄蝶和灰蝶了，它们<img src="../images/h03.gif" width="32" height="29" alt=""/>有&ldquo;来无影，去无踪&rdquo;的飞行本领。凤蝶在飞行途中，还会作滑翔表演哩。 </td>
